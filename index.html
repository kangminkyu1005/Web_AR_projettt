<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR 위치 고정 버전</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('ar-tracker', {
        init: function () {
          this.reticle = document.querySelector('#reticle');
        },
        tick: function () {
          const cameraEl = document.querySelector('[camera]');
          const cameraObj = cameraEl.object3D;
          
          // 카메라 정면 1.5m 지점 계산
          const vector = new THREE.Vector3(0, 0, -1.5); 
          vector.applyQuaternion(cameraObj.quaternion);
          vector.add(cameraObj.position);

          if (this.reticle) {
            this.reticle.object3D.position.copy(vector);
            this.reticle.object3D.lookAt(cameraObj.position);
          }
        }
      });

      AFRAME.registerComponent('tap-to-place', {
        init: function () {
          window.addEventListener('click', () => {
            const sceneEl = this.el;
            const reticle = document.querySelector('#reticle');
            const worldPosition = new THREE.Vector3();
            reticle.object3D.getWorldPosition(worldPosition);

            const newPoint = document.createElement('a-sphere');
            newPoint.setAttribute('radius', '0.08');
            newPoint.setAttribute('color', '#FF4500');
            newPoint.setAttribute('material', 'shader: flat;');
            newPoint.setAttribute('position', worldPosition);

            sceneEl.appendChild(newPoint);
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      ar-tracker
      tap-to-place>
      
      <a-light type="ambient" intensity="1.5"></a-light>

      <a-ring id="reticle" radius-inner="0.03" radius-outer="0.05" color="#00FF00"></a-ring>

      <a-entity camera position="0 1.6 0" look-controls="touchEnabled: false;"></a-entity>
      
    </a-scene>
  </body>
</html>
