<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>최종 점검 완료 - WebAR 지점 생성</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script>
      AFRAME.registerComponent('click-manager', {
        init: function () {
          this.el.addEventListener('click', (evt) => {
            // 클릭한 지점의 좌표 가져오기
            const touchPoint = evt.detail.intersection.point;
            
            // 새로운 지점 표시(Entity) 생성
            const newPoint = document.createElement('a-entity');
            
            // 노란색 원판 배경
            const circle = document.createElement('a-circle');
            circle.setAttribute('radius', '0.15');
            circle.setAttribute('color', '#FFD700');
            circle.setAttribute('material', 'shader: flat; side: double');
            
            // 'HERE' 텍스트
            const text = document.createElement('a-text');
            text.setAttribute('value', 'HERE');
            text.setAttribute('align', 'center');
            text.setAttribute('width', '1.2');
            text.setAttribute('color', '#000');
            text.setAttribute('position', '0 0 0.01');

            newPoint.appendChild(circle);
            newPoint.appendChild(text);
            
            // 터치한 위치에 배치 및 카메라 응시
            newPoint.setAttribute('position', touchPoint);
            newPoint.setAttribute('look-at', '[camera]');
            
            this.el.sceneEl.appendChild(newPoint);
          });
        }
      });
    </script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 1000; color: white; background: rgba(0,0,0,0.7);
        padding: 10px 20px; border-radius: 20px; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="ui">화면을 터치해 포인트를 생성하세요</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      renderer="logarithmicDepthBuffer: true;"
      click-manager>
      
      <a-entity cursor="rayOrigin: mouse" raycaster="objects: .collidable"></a-entity>

      <a-plane class="collidable" 
               position="0 0 -2" 
               rotation="-90 0 0" 
               width="100" height="100" 
               material="opacity: 0; transparent: true">
      </a-plane>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
