<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Harry Potter Face AR</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #status-log {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            padding: 12px; border-radius: 8px; background: rgba(0, 0, 0, 0.8);
            color: #ffc500; font-family: 'Courier New', monospace; font-size: 13px;
            border: 1px solid #ffc500; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="status-log">마법 주문 준비 중...</div>

<a-scene 
    mindar-face="filterMinCF: 0.1; filterBeta: 10; uiScanning: false" 
    embedded 
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-assets>
        <img id="scar" src="scar.png" crossorigin="anonymous">
    </a-assets>

    <a-camera active="true" position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="faceTarget" mindar-face-target="anchorIndex: 168">
        
        <a-entity position="0 0.12 0.08">
            <a-image 
                src="#scar" 
                width="0.4" 
                height="0.4"
                material="transparent: true; alphaTest: 0.5; side: double; shader: flat">
            </a-image>

            <a-text 
                value="THE BOY WHO LIVED" 
                position="0 0.4 0" 
                align="center" 
                color="#ffc500" 
                width="2"
                font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
            </a-text>
        </a-entity>

    </a-entity>

</a-scene>

<script>
    const log = document.getElementById("status-log");
    const sceneEl = document.querySelector('a-scene');
    const targetEl = document.querySelector('#faceTarget');

    // AR 엔진 준비 완료
    sceneEl.addEventListener("arReady", () => {
        log.innerText = "번개 흉터 준비 완료! 얼굴을 비춰주세요.";
        log.style.borderColor = "#4CAF50";
        log.style.color = "#4CAF50";
    });

    // 얼굴 인식 성공
    targetEl.addEventListener("targetFound", () => {
        log.innerText = "해리 포터를 확인했습니다.";
        log.style.display = "none"; // 인식되면 로그 숨기기 (선택 사항)
    });

    // 얼굴 놓침
    targetEl.addEventListener("targetLost", () => {
        log.style.display = "block";
        log.innerText = "얼굴을 찾는 중...";
        log.style.color = "#ffc500";
    });

    // 오류 발생 (HTTPS 미적용 등)
    sceneEl.addEventListener("arError", (event) => {
        log.innerText = "마법 실패: HTTPS 환경인지 확인하세요.";
        log.style.borderColor = "#ff5252";
        log.style.color = "#ff5252";
    });
</script>

</body>
</html>
