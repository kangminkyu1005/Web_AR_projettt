<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile WebAR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-overlay {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="ui-overlay">카메라로 주변을 비춰보세요</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">
        
        <a-marker preset="hiro">
            <a-box position="0 0.5 0" 
                   material="color: #3b82f6; opacity: 0.8;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            </a-box>
            <a-text value="Hello AR!" position="0 1.2 0" align="center" color="#ffffff"></a-text>
        </a-marker>

        <a-entity position="0 0 -5">
            <a-sphere position="0 1.5 0" radius="0.5" color="#ef4444"
                      animation="property: position; dir: alternate; dur: 1000; easing: easeInSine; loop: true; to: 0 1.8 0">
            </a-sphere>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
