<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR 카메라 해결 버전</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script>
    // 에러 방지를 위해 고유 이름 사용
    AFRAME.registerComponent('ar-manager', {
      init: function () {
        this.reticle = document.getElementById('reticle');
        this.xrHitTestSource = null;
        this.viewerSpace = null;

        // AR 세션이 시작될 때 카메라 피드 연결 확인
        this.el.sceneEl.renderer.xr.addEventListener('sessionstart', async () => {
          const session = this.el.sceneEl.renderer.xr.getSession();
          this.viewerSpace = await session.requestReferenceSpace('viewer');
          this.xrHitTestSource = await session.requestHitTestSource({ space: this.viewerSpace });
          console.log("AR 세션 시작됨");
        });

        // 터치 시 물체 생성
        window.addEventListener('click', () => {
          if (this.reticle && this.reticle.getAttribute('visible')) {
            const ball = document.createElement('a-sphere');
            ball.setAttribute('radius', '0.05');
            ball.setAttribute('color', '#FF4500');
            ball.setAttribute('position', this.reticle.getAttribute('position'));
            this.el.sceneEl.appendChild(ball);
          }
        });
      },
      tick: function () {
        const frame = this.el.sceneEl.frame;
        if (!frame || !this.xrHitTestSource) return;

        const hitTestResults = frame.getHitTestResults(this.xrHitTestSource);
        if (hitTestResults.length > 0) {
          const hit = hitTestResults[0];
          const pose = hit.getPose(this.el.sceneEl.renderer.xr.getReferenceSpace());
          this.reticle.setAttribute('visible', true);
          this.reticle.setAttribute('position', pose.transform.position);
          this.reticle.object3D.quaternion.copy(pose.transform.orientation);
        } else {
          this.reticle.setAttribute('visible', false);
        }
      }
    });
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent;
    }

    #overlay {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 15px;
      border-radius: 10px;
      font-family: sans-serif;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="overlay">
    1. 오른쪽 아래 <b>[AR]</b> 버튼 클릭<br>
    2. 카메라 권한 <b>'허용'</b><br>
    3. 바닥을 비추면 초록 원이 생깁니다.
  </div>

  <a-scene webxr="optionalFeatures: hit-test, local-floor;"
    renderer="antialias: true; alpha: true; colorManagement: true; precision: medium;" ar-manager>

    <a-ring id="reticle" rotation="-90 0 0" radius-inner="0.04" radius-outer="0.06" color="#00FF00"
      visible="false"></a-ring>

    <a-entity camera position="0 1.6 0"></a-entity>
    <a-light type="ambient" intensity="1"></a-light>
  </a-scene>
</body>

</html>
