<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindAR - 3D 피카츄 세우기</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 100;" color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true; exposure: 1.5;" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="pikaModel" src="./pikachu.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="0 5 5" intensity="0.8"></a-light>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model id="pika-entity" src="#pikaModel" position="0 0 0" scale="1 1 1" rotation="-90 -180 0"
        animation-mixer>
      </a-gltf-model>

      <a-ellipse color="black" opacity="0.3" radius-x="0.5" radius-y="0.3" rotation="-90 0 0" position="0 -0.01 0">
      </a-ellipse>
    </a-entity>
  </a-scene>

  <script>
    // 마커를 찾았을 때 콘솔에 표시 (디버깅용)
    const targetEl = document.querySelector('[mindar-image-target]');
    targetEl.addEventListener("targetFound", event => {
      console.log("피카츄 발견!");
    });
  </script>
</body>

</html>
